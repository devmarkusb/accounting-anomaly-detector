name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: System libraries for PySide6
        run: sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0

      - name: Install project
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Test
        run: pytest tests/ -v
        env:
          QT_QPA_PLATFORM: offscreen
