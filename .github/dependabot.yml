version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    cooldown:
      default-days: 3
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    versioning-strategy: increase-if-necessary
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 2
    groups:
      python-deps-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
